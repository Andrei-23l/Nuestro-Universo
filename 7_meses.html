<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Explora Nuestro Universo ❤️</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #02020a;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            cursor: grab;
        }

        body:active { cursor: grabbing; }

        
        #universe {
            position: absolute;
            width: 4000px; 
            height: 4000px;
            top: -1500px; 
            left: -1500px;
            background: radial-gradient(circle at center, #05051a 0%, #02020a 100%);
            z-index: 0;
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: blink 3s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        .special-star {
            background-color: #ffd700;
            box-shadow: 0 0 15px #ffd700, 0 0 30px #ffd700;
            animation: specialBlink 2s infinite;
            cursor: pointer;
            z-index: 5;
        }

        @keyframes specialBlink {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.8); opacity: 1; }
        }

        
        .ui-overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 10px black;
        }

        #special-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 30, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            width: 80%;
            max-width: 400px;
            border: 1px solid #ffd700;
            z-index: 200;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        #special-message.visible { display: block; }

        button {
            background: #ffd700;
            border: none;
            color: black;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <h2 style="margin:0; color:#ffd700;">Nuestro Espacio - Felices 7 meses✨</h2>
        <p style="margin:5px 0;">Arrastra la pantalla para buscar las estrellas.</p>
    </div>

    <div id="universe"></div>

    <div id="special-message">
        <h2 id="msg-title" style="color: #ffd700; margin-top:0;"></h2>
        <p id="msg-text" style="line-height:1.6;"></p>
        <button onclick="closeMessage()">Seguir explorando</button>
    </div>

    <script>
        const universe = document.getElementById('universe');
        const specialMessage = document.getElementById('special-message');
        const msgTitle = document.getElementById('msg-title');
        const msgText = document.getElementById('msg-text');

        const mensajes = [
            { t: "La Primera Conversación", d: "Desde ese día supe que serías alguien especial en mi vida." },
            { t: "Nuestras Risas", d: "Amo cómo logramos reírnos de cualquier tontería juntos." },
            { t: "Tu Apoyo", d: "Gracias por estar ahí cuando el mundo se pone difícil." },
            { t: "Un Mes Más", d: "Cada segundo a tu lado cuenta y vale oro para mí." },
            { t: "Tus ojos", d: "Me dan paz que no encuentro en ningún otro lugar." },
            { t: "Aventuras", d: "Por todos los planes que aún nos faltan por cumplir." },
            { t: "Pequeños Detalles", d: "Cada que vuelvo a ver los regalos que me hiciste me enamoras mas." },
            { t: "Cero Distancia", d: "No importa dónde estemos, mi corazón siempre está contigo." },
            { t: "Eres Única", d: "No cambiaría absolutamente nada de nuestra historia." },
            { t: "Te Amo", d: "Por este mes y todos los que vienen. Eres mi universo entero." }
        ];

       
        let isDragging = false;
        let startX, startY;
        let scrollLeft, scrollTop;

        window.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.pageX - universe.offsetLeft;
            startY = e.pageY - universe.offsetTop;
        });

        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mouseleave', () => isDragging = false);

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const x = e.pageX - startX;
            const y = e.pageY - startY;
            universe.style.left = `${x}px`;
            universe.style.top = `${y}px`;
        });

        
        window.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].pageX - universe.offsetLeft;
            startY = e.touches[0].pageY - universe.offsetTop;
        });
        window.addEventListener('touchend', () => isDragging = false);
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const x = e.touches[0].pageX - startX;
            const y = e.touches[0].pageY - startY;
            universe.style.left = `${x}px`;
            universe.style.top = `${y}px`;
        });

        function init() {
            
            for (let i = 0; i < 800; i++) {
                createStar(false);
            }
           
            mensajes.forEach(m => createStar(true, m));
        }

        function createStar(isSpecial, content = null) {
            const star = document.createElement('div');
            star.classList.add('star');
            
            
            const x = Math.random() * 3900 + 50;
            const y = Math.random() * 3900 + 50;
            
            star.style.left = `${x}px`;
            star.style.top = `${y}px`;
            
            const size = isSpecial ? 8 : Math.random() * 3 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;

            if (isSpecial) {
                star.classList.add('special-star');
                star.onclick = (e) => {
                    e.stopPropagation(); 
                    showMessage(content.t, content.d);
                };
            }

            universe.appendChild(star);
        }

        function showMessage(title, text) {
            msgTitle.innerText = title;
            msgText.innerText = text;
            specialMessage.classList.add('visible');
        }

        function closeMessage() {
            specialMessage.classList.remove('visible');
        }

        init();
    </script>
</body>
</html>
