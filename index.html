<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nuestro Universo ❤️</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #02020a; font-family: sans-serif; color: white; cursor: grab; }
        #overlay-inicio { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #02020a; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #universe { position: absolute; width: 7000px; height: 7000px; background: radial-gradient(circle, #05051a 0%, #02020a 100%); z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; }
        .special-star { width: 10px!important; height: 10px!important; background: #ffd700!important; box-shadow: 0 0 15px #ffd700; cursor: pointer; z-index: 10; }
        .gift-star { width: 10px!important; height: 10px!important; background: #ff69b4!important; box-shadow: 0 0 15px #ff69b4; cursor: pointer; z-index: 10; }
        #lyrics-container { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; z-index: 50; width: 90%; }
        #lyric-es { font-size: 2em; font-weight: bold; text-shadow: 0 0 10px black; }
        #player-ui { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 30px; z-index: 100; }
        button { background: #ffd700; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay-inicio">
        <h1>Nuestro Universo</h1>
        <button onclick="empezar()">ENTRAR AL VIAJE ✨</button>
    </div>

    <div id="lyrics-container"><div id="lyric-es"></div></div>
    <div id="universe"></div>
    <div id="player-ui"><span id="btn-play" onclick="toggle()" style="cursor:pointer">⏸ PAUSAR</span></div>

    <audio id="audio">
        <source src="musica_1.mp3" type="audio/mpeg">
        <track src="letra_1.vtt" kind="captions" srclang="es" default>
    </audio>

    <script>
        const audio = document.getElementById('audio');
        const lyricEs = document.getElementById('lyric-es');
        const universe = document.getElementById('universe');

        function empezar() {
            document.getElementById('overlay-inicio').style.display = 'none';
            audio.play();
            setupLyrics();
        }

        function toggle() {
            if (audio.paused) { audio.play(); document.getElementById('btn-play').innerText = "⏸ PAUSAR"; }
            else { audio.pause(); document.getElementById('btn-play').innerText = "▶ REPRODUCIR"; }
        }

        function setupLyrics() {
            const track = audio.textTracks[0];
            track.mode = 'hidden';
            track.oncuechange = () => {
                const cues = track.activeCues;
                lyricEs.innerText = cues.length > 0 ? cues[0].text.replace(/\n/g, ' ') : "";
            };
        }

        // --- ESTRELLAS ---
        const mensajes = [
            { t: "La Primera Conversación", d: "Desde ese día supe que serías alguien especial." },
            { t: "Nuestras Risas", d: "Amo cómo logramos reírnos de cualquier tontería." },
            { t: "Tu Apoyo", d: "Gracias por estar ahí cuando el mundo se pone difícil." },
            { t: "Un Mes Más", d: "Cada segundo a tu lado cuenta y vale oro." },
            { t: "Tus ojos", d: "Me dan paz que no encuentro en ningún otro lugar." },
            { t: "Aventuras", d: "Por todos los planes que aún nos faltan por cumplir." },
            { t: "Pequeños Detalles", d: "Cada que vuelvo a ver los regalos me enamoras mas." },
            { t: "Cero Distancia", d: "No importa dónde estemos, mi corazón está contigo." },
            { t: "Eres Única", d: "No cambiaría nada de nuestra historia." },
            { t: "Te Amo", d: "Eres mi universo entero. Felices 7 meses." }
        ];

        const regalos = [
            { t: "Mes 2", link: "2_meses.html" }, { t: "Mes 3", link: "3_meses.html" },
            { t: "Mes 4", link: "4_meses.html" }, { t: "Mes 5", link: "5_meses.html" },
            { t: "Mes 6", link: "6_meses.html" }, { t: "Mes 7", link: "7_meses.html" },
            { t: "Hola", link: "hola.html" }
        ];

        function createStar(type, content) {
            const s = document.createElement('div');
            s.className = 'star ' + (type === 'bg' ? '' : type + '-star');
            s.style.left = Math.random() * 6500 + 250 + 'px';
            s.style.top = Math.random() * 6500 + 250 + 'px';
            if(type === 'bg') { 
                const size = Math.random() * 2 + 1;
                s.style.width = size+'px'; s.style.height = size+'px';
            } else {
                s.onclick = (e) => {
                    e.stopPropagation();
                    if(type === 'special') alert(content.t + ":\n\n" + content.d);
                    else if(confirm("¿Abrir regalo: " + content.t + "?")) window.open(content.link, '_blank');
                };
            }
            universe.appendChild(s);
        }

        for(let i=0; i<1500; i++) createStar('bg');
        mensajes.forEach(m => createStar('special', m));
        regalos.forEach(r => createStar('gift', r));

        // Movimiento simple
        let isDragging = false, startX, startY;
        window.onmousedown = (e) => { isDragging = true; startX = e.pageX - universe.offsetLeft; startY = e.pageY - universe.offsetTop; };
        window.onmousemove = (e) => { if(isDragging) { universe.style.left = (e.pageX - startX) + 'px'; universe.style.top = (e.pageY - startY) + 'px'; } };
        window.onmouseup = () => isDragging = false;
    </script>
</body>
</html>
