<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nuestro Universo - 7 Meses ❤️</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #02020a;
            font-family: 'Segoe UI', sans-serif; color: white;
            cursor: grab;
        }
        body:active { cursor: grabbing; }

        #overlay-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #05051a 0%, #02020a 100%);
            z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        #universe {
            position: absolute; 
            width: 7000px; height: 7000px;
            background: radial-gradient(circle at center, #05051a 0%, #02020a 100%);
            z-index: 0;
            transition: transform 0.1s ease-out;
        }

        #lyrics-container {
            position: fixed; top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; pointer-events: none;
            z-index: 50; width: 90%;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }
        #lyric-es { font-size: 2.2em; font-weight: bold; margin-bottom: 10px; min-height: 1.2em; }
        #lyric-en { font-size: 1.2em; font-style: italic; color: rgba(255,255,255,0.6); min-height: 1.2em; }

        .star { position: absolute; background-color: white; border-radius: 50%; animation: blink 3s infinite; }
        .clickable-star { cursor: pointer; z-index: 10; }
        .special-star { width: 9px !important; height: 9px !important; box-shadow: 0 0 15px 5px #ffd700; }
        .gift-star { width: 9px !important; height: 9px !important; box-shadow: 0 0 18px 6px #ff69b4; }

        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.9; } }

        #player-ui {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 50px;
            display: flex; align-items: center; gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 2000;
        }
        .player-btn {
            background: none; border: none; color: white;
            font-size: 1.4em; cursor: pointer; transition: 0.2s;
        }
        #song-info { font-size: 0.75em; color: #ffd700; font-weight: bold; min-width: 70px; text-align: center; }

        #special-message {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 30, 0.95); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 30px; width: 80%; max-width: 400px;
            border: 1px solid #ffd700; z-index: 3000; text-align: center;
        }
        button.main-btn { background: #ffd700; border: none; color: black; padding: 12px 24px; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay-inicio">
        <h1 style="color: #ffd700;">Nuestro Universo</h1>
        <p>Sube el volumen para comenzar</p>
        <button class="main-btn" onclick="empezarViaje()">INICIAR VIAJE ✨</button>
    </div>

    <div id="lyrics-container">
        <div id="lyric-en"></div>
        <div id="lyric-es"></div>
    </div>

    <div id="universe"></div>

    <div id="player-ui">
        <button class="player-btn" onclick="cambiarCancion(-1)">⏮</button>
        <button class="player-btn" id="play-pause" onclick="togglePlay()">⏸</button>
        <button class="player-btn" onclick="cambiarCancion(1)">⏭</button>
        <div id="song-info">Música 1</div>
    </div>

    <div id="special-message">
        <h2 id="msg-title" style="color: #ffd700; margin-top:0;"></h2>
        <p id="msg-text" style="line-height:1.6;"></p>
        <button class="main-btn" onclick="closeMessage()">Seguir explorando</button>
    </div>

    <audio id="cancion" preload="auto">
        <source id="audio-src" src="musica_1.mp3" type="audio/mpeg">
        <track id="track-letras" kind="captions" src="letra_1.vtt" srclang="es" default>
    </audio>

    <script>
        const universe = document.getElementById('universe');
        const audio = document.getElementById('cancion');
        const audioSrc = document.getElementById('audio-src');
        const playPauseBtn = document.getElementById('play-pause');
        const lyricEs = document.getElementById('lyric-es');
        const lyricEn = document.getElementById('lyric-en');
        const songInfo = document.getElementById('song-info');

        let currentSongIndex = 1;
        const totalSongs = 1; // AJUSTA ESTO SI SUBES MÁS CANCIONES

        // Configuración inicial del track de letras
        function setupTrack() {
            const track = audio.textTracks[0];
            if (track) {
                track.mode = 'hidden'; // Evita que el navegador ponga sus propias letras feas
                track.oncuechange = () => {
                    const cues = track.activeCues;
                    if (cues && cues.length > 0) {
                        const lineas = cues[0].text.split('\n');
                        lyricEn.innerText = lineas[0] || "";
                        lyricEs.innerText = lineas[1] || "";
                    } else {
                        lyricEn.innerText = "";
                        lyricEs.innerText = "";
                    }
                };
            }
        }

        function empezarViaje() {
            document.getElementById('overlay-inicio').style.display = 'none';
            setupTrack();
            audio.play().catch(e => console.log("Error de reproducción:", e));
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playPauseBtn.innerText = "⏸";
            } else {
                audio.pause();
                playPauseBtn.innerText = "▶";
            }
        }

        function cambiarCancion(dir) {
            currentSongIndex += dir;
            if (currentSongIndex > totalSongs) currentSongIndex = 1;
            if (currentSongIndex < 1) currentSongIndex = totalSongs;
            
            // Actualizar archivos
            audio.pause();
            audioSrc.src = `musica_${currentSongIndex}.mp3`;
            
            // Reemplazar el track de letras para la nueva canción
            const oldTrack = document.getElementById('track-letras');
            const newTrack = document.createElement('track');
            newTrack.id = 'track-letras';
            newTrack.kind = 'captions';
            newTrack.src = `letra_${currentSongIndex}.vtt`;
            newTrack.srclang = 'es';
            newTrack.default = true;
            
            audio.removeChild(oldTrack);
            audio.appendChild(newTrack);
            
            songInfo.innerText = `Música ${currentSongIndex}`;
            
            audio.load();
            audio.oncanplaythrough = () => {
                audio.play();
                setupTrack();
                playPauseBtn.innerText = "⏸";
            };
        }

        // --- LÓGICA DE MOVIMIENTO Y ESTRELLAS (SIN CAMBIOS) ---
        const universeSize = 7000;
        let curX = -(universeSize / 2) + (window.innerWidth / 2);
        let curY = -(universeSize / 2) + (window.innerHeight / 2);
        universe.style.left = curX + 'px';
        universe.style.top = curY + 'px';

        let isDragging = false, startX, startY;
        const moveStart = (e) => { 
            if (e.target.closest('#player-ui') || e.target.classList.contains('clickable-star')) return;
            isDragging = true; 
            startX = (e.pageX || e.touches[0].pageX) - universe.offsetLeft; 
            startY = (e.pageY || e.touches[0].pageY) - universe.offsetTop; 
        };
        const moveAction = (e) => {
            if (!isDragging) return;
            e.preventDefault();
            universe.style.left = ((e.pageX || e.touches[0].pageX) - startX) + 'px';
            universe.style.top = ((e.pageY || e.touches[0].pageY) - startY) + 'px';
        };

        window.addEventListener('mousedown', moveStart); window.addEventListener('touchstart', moveStart);
        window.addEventListener('mousemove', moveAction); window.addEventListener('touchmove', moveAction);
        window.addEventListener('mouseup', () => isDragging = false); window.addEventListener('touchend', () => isDragging = false);

        const mensajes = [
            { t: "La Primera Conversación", d: "Desde ese día supe que serías alguien especial." },
            { t: "Nuestras Risas", d: "Amo cómo logramos reírnos de cualquier tontería." },
            { t: "Te Amo", d: "Eres mi universo entero. Felices 7 meses." }
        ];
        const regalos = [{ t: "Mes 7", link: "7_meses.html" }];

        function init() {
            for (let i = 0; i < 2000; i++) createStar('bg');
            mensajes.forEach(m => createStar('special', m));
            regalos.forEach(r => createStar('gift', r));
        }

        function createStar(type, content = null) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * (universeSize - 200) + 100 + 'px';
            star.style.top = Math.random() * (universeSize - 200) + 100 + 'px';
            if (type === 'bg') {
                const s = Math.random() * 2 + 1;
                star.style.width = s + 'px'; star.style.height = s + 'px';
            } else {
                star.classList.add('clickable-star');
                if (type === 'special') {
                    star.classList.add('special-star');
                    star.onclick = (e) => {
                        e.stopPropagation();
                        document.getElementById('msg-title').innerText = content.t;
                        document.getElementById('msg-text').innerText = content.d;
                        document.getElementById('special-message').style.display = 'block';
                    };
                } else if (type === 'gift') {
                    star.classList.add('gift-star');
                    star.onclick = (e) => {
                        e.stopPropagation();
                        if(confirm(`¿Abrir regalo: ${content.t}?`)) window.open(content.link, '_blank');
                    };
                }
            }
            universe.appendChild(star);
        }
        function closeMessage() { document.getElementById('special-message').style.display = 'none'; }
        init();
    </script>
</body>
</html>
