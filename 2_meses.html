<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Feliz 2 Meses 💖</title>
    <style>
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
            touch-action: none;
            cursor: pointer;
        }

        .stage {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .anniversary-title {
            position: fixed;
            top: 25px;
            width: 100%;
            text-align: center;
            color: #ff69b4;
            font-size: clamp(1.8em, 8vw, 2.5em);
            text-shadow: 0 0 10px #fff, 0 0 20px #ff69b4;
            z-index: 50;
            pointer-events: none;
            animation: title-glow 2s infinite alternate;
        }

        .glitch-text {
            color: #fff;
            font-size: 4.5em;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            position: relative;
            z-index: 10;
            user-select: none;
            cursor: pointer;
            text-shadow:
                0 0 5px rgba(255, 105, 180, 0.8),
                -2px -2px 0 #fff,
                2px 2px 0 #ff69b4;
            animation: shake 0.5s infinite alternate;
        }

        .glitch-text::before, .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            text-shadow: none;
            z-index: -1;
            animation: glitch-shift 0.3s infinite alternate;
        }

        .glitch-text::before { color: #ff69b4; }
        .glitch-text::after { color: #fff; z-index: -2; filter: blur(1px); animation: glitch-shift-alt 0.4s infinite alternate; }
        
        .background-word {
            position: absolute;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: rgba(255, 105, 180, 0.15);
            user-select: none;
            pointer-events: none;
            animation: background-float 15s linear infinite;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.5);
        }

        .floating-heart {
            position: fixed;
            bottom: -50px;
            font-size: 2rem;
            color: #ff69b4;
            animation: float-up 5s linear forwards;
            pointer-events: none;
            opacity: 0;
            text-shadow: 0 0 10px #ff007f;
        }
        
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #ff69b4;
            border-radius: 50%;
            pointer-events: none;
            animation: particle-fade-out 1s forwards;
            box-shadow: 0 0 10px #ff69b4, 0 0 20px #ff69b4;
        }

        .cascading-word {
            position: absolute;
            font-size: 6vw;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 10px #ff69b4;
            opacity: 0;
            white-space: nowrap;
            user-select: none;
            z-index: 5;
            animation: cascade 5s linear forwards, fade-out 5s linear forwards;
        }

        .click-word {
            position: absolute;
            font-size: 4vw;
            color: rgba(255, 105, 180, 0.9);
            text-shadow: 0 0 5px #fff;
            opacity: 1;
            animation: pop-up 1s ease-out forwards;
            z-index: 20;
        }

        .modal {
            display: flex;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(5px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .modal.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background-color: #fff;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.9);
            color: #000;
            max-width: 90%;
            font-family: Arial, sans-serif;
            transform: scale(0.9);
            transition: transform 0.4s ease;
        }
        
        .modal.show .modal-content {
            transform: scale(1);
        }

        #carta-modal .modal-content {
            background-color: #fcfcf0;
            border: 2px solid #ff69b4;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h2 { color: #ff69b4; font-size: 1.5em; }

        #password-input {
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #ff69b4;
            border-radius: 5px;
            width: 80%;
            max-width: 200px;
            text-align: center;
            font-size: 1.5em;
        }

        #letter-textarea {
            width: 100%;
            height: 30vh;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-top: 15px;
            box-sizing: border-box;
            resize: none;
            font-family: 'Times New Roman', serif;
            font-size: 1.1em;
            line-height: 1.4;
        }

        .modal-button {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.2s;
            font-size: 1.1em;
        }

        .modal-button:hover { background-color: #e04a9e; transform: scale(1.05); }

        #heart-animation-container {
            background-color: #000;
            overflow: hidden;
        }

        /* --- ESTILOS MEJORADOS PARA LA ANIMACIÓN DEL CORAZÓN --- */
        .heart {
            position: relative;
            width: 100px;
            height: 90px;
            opacity: 0;
            transform: scale(0.1);
            animation: heart-intro 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, 
                       heart-pulse 1.2s infinite alternate 1s;
        }

        .heart::before, .heart::after {
            content: "";
            position: absolute;
            top: 0;
            width: 52px;
            height: 80px;
            border-radius: 50px 50px 0 0;
            background: #ff69b4;
        }

        .heart::before { left: 50px; transform: rotate(-45deg); transform-origin: 0 100%; }
        .heart::after { left: 0; transform: rotate(45deg); transform-origin: 100% 100%; }

        .love-text {
            color: #fff;
            font-size: 4em;
            font-family: 'Brush Script MT', cursive;
            text-shadow: 0 0 15px #ff69b4;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(20px);
            animation: text-fade-in 2s ease-out 1.5s forwards;
        }

        /* --- NUEVOS EFECTOS: Palabras y Estrellas --- */
        .love-word {
            position: absolute;
            color: #fff;
            font-family: 'Garamond', serif;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            text-shadow: 0 0 5px #fff, 0 0 15px #ff69b4;
            pointer-events: none;
            user-select: none;
            animation: shine-and-fade 3s ease-in-out forwards;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background-color: #fff;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px 2px #fff;
            animation: twinkle 4s infinite;
        }

        /* --- KEYFRAMES --- */
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 50% { transform: translate(-1px, 0px) rotate(-0.5deg); } 100% { transform: translate(0px, -1px) rotate(0.5deg); } }
        @keyframes glitch-shift { 0% { transform: translate(-5px, 0); clip-path: inset(10px 0 50px 0); } 40% { transform: translate(5px, 0); clip-path: inset(70px 0 0 0); } 100% { transform: translate(-3px, 0); clip-path: inset(20px 0 20px 0); } }
        @keyframes glitch-shift-alt { 0% { transform: translate(3px, -2px); clip-path: inset(50px 0 0 0); } 60% { transform: translate(-3px, 2px); clip-path: inset(0 0 30px 0); } 100% { transform: translate(1px, -1px); clip-path: inset(40px 0 40px 0); } }
        @keyframes cascade { 0% { transform: translateY(-100vh) scale(1) rotate(0deg); opacity: 0.8; filter: blur(0px); } 100% { transform: translateY(100vh) scale(1.5) rotate(15deg); opacity: 0.1; filter: blur(5px); } }
        @keyframes fade-out { 0% { opacity: 0; } 5% { opacity: 0.8; } 90% { opacity: 0.5; } 100% { opacity: 0; } }
        @keyframes pop-up { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5) translateY(-50px); opacity: 0; } }
        @keyframes title-glow { from { text-shadow: 0 0 10px #fff, 0 0 20px #ff69b4; } to { text-shadow: 0 0 20px #fff, 0 0 40px #ff007f; } }
        @keyframes text-fade-in { to { opacity: 1; transform: translateY(0); } }
        @keyframes float-up { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(-120vh) rotate(720deg); opacity: 0; } }
        @keyframes background-float { 0% { transform: translateX(-100%); opacity: 0; } 25% { opacity: 0.15; } 75% { opacity: 0.15; } 100% { transform: translateX(100vw); opacity: 0; } }
        @keyframes particle-fade-out { to { transform: scale(0.1) translate(var(--x), var(--y)); opacity: 0; } }

        /* --- NUEVOS KEYFRAMES PARA EFECTOS --- */
        @keyframes heart-intro {
            0% { transform: scale(0.1); opacity: 0; box-shadow: 0 0 50px 50px #ff69b4; }
            80% { transform: scale(1.6); opacity: 1; box-shadow: 0 0 15px 15px #ff69b4; }
            100% { transform: scale(1.5); opacity: 1; box-shadow: 0 0 5px 5px #ff69b4; }
        }
        @keyframes heart-pulse {
            from { transform: scale(1.5); box-shadow: 0 0 10px #ff69b4; }
            to { transform: scale(1.6); box-shadow: 0 0 25px #ff007f; }
        }
        @keyframes shine-and-fade {
            0%, 100% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="anniversary-title">Feliz dos meses</div>

    <div class="stage" id="stage">
        <div class="glitch-text" data-text="TE ADORO" id="main-text">
            TE ADORO <span style="font-size: 1.2em;">💖</span>
        </div>
    </div>

    <div id="heart-animation-container" class="modal">
        <div id="love-effects-container"></div>
        <div class="heart"></div>
        <div class="love-text">Te Amo</div>
    </div>

    <div id="password-modal" class="modal">
        <div class="modal-content">
            <h2>🔐 Introduce la Contraseña 🔐</h2>
            <p>4 digitos...</p>
            <input type="number" id="password-input" placeholder="XXXX" maxlength="4" />
            <div id="password-error" style="color: red; margin-top: 10px; display: none;">Contraseña incorrecta. ¡Inténtalo de nuevo!</div>
            <button class="modal-button" onclick="checkPassword()">Acceder</button>
        </div>
    </div>

    <div id="carta-modal" class="modal">
        <div class="modal-content">
            <h2>💌 ¡Te amo hermosa! 💌</h2>
            <textarea id="letter-textarea" readonly>Mi amor,

¡Felices dos meses! Parece que fue ayer cuando empezamos esta aventura juntos, y cada día a tu lado ha sido un regalo.

Gracias por tu sonrisa, por hacer que cada momento sea especial. Eres una persona increíble y me siento muy afortunado de tenerte en mi vida.

Te adoro con todo mi corazón.

Con cariño,
Andrei</textarea>
            <button class="modal-button" onclick="closeModal('carta-modal')">Cerrar</button>
        </div>
    </div>

    <script>
        const stage = document.getElementById('stage');
        const mainText = document.getElementById('main-text');
        const passwordModal = document.getElementById('password-modal');
        const cartaModal = document.getElementById('carta-modal');
        const passwordInput = document.getElementById('password-input');
        const passwordError = document.getElementById('password-error');
        const heartAnimationContainer = document.getElementById('heart-animation-container');
        const loveEffectsContainer = document.getElementById('love-effects-container');
        
        const CORRECT_PASSWORD = '1708';
        const texts = ["TE ADORO", "ERES TÚ"]; 
        const clickWords = ["WOW", "💖", "💘", "LOVE", "KISS"]; 
        const backgroundWords = ["Hermosa", "Preciosa", "Mi Amor", "Bonita", "Mi Cielo", "Encantadora", "Única"];
        const loveWords = ["Preciosa", "Bonita", "Mi Reina", "Hermosa", "Te Amo"];

        let wordInterval, starInterval;

        const openPasswordModal = (e) => {
            e.stopPropagation(); 
            if (passwordModal.classList.contains('show') || cartaModal.classList.contains('show')) return;
            
            passwordModal.classList.add('show');
            passwordInput.value = ''; 
            passwordError.style.display = 'none'; 
            passwordInput.focus();
        };

        mainText.addEventListener('click', openPasswordModal);
        mainText.addEventListener('touchstart', openPasswordModal);

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        function startLoveEffects() {
            for(let i = 0; i < 50; i++) createStar();
            wordInterval = setInterval(createLoveWord, 600);
        }

        function stopLoveEffects() {
            clearInterval(wordInterval);
            loveEffectsContainer.innerHTML = '';
        }

        function checkPassword() {
            if (passwordInput.value === CORRECT_PASSWORD) {
                closeModal('password-modal');
                heartAnimationContainer.classList.add('show');
                startLoveEffects();

                setTimeout(() => {
                    closeModal('heart-animation-container');
                    cartaModal.classList.add('show');
                    stopLoveEffects();
                }, 5000);
                
            } else {
                passwordError.style.display = 'block';
                passwordInput.value = '';
                passwordModal.querySelector('.modal-content').animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 300, iterations: 1 });
            }
        }
        
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        function createCascadingWord() {
            const text = texts[Math.floor(Math.random() * texts.length)];
            const word = document.createElement('div');
            word.textContent = text;
            word.classList.add('cascading-word');
            word.style.left = `${Math.random() * 100}vw`;
            word.style.top = `${-20}vh`;
            const size = Math.random() * (1.2 - 0.8) + 0.8;
            const duration = Math.random() * (3.5 - 2.5) + 2.5;
            word.style.fontSize = `${size * 6}vw`;
            word.style.animationDuration = `${duration}s`;
            word.style.animationDelay = `-${Math.random() * 3}s`;
            stage.appendChild(word);
            word.addEventListener('animationend', () => word.remove());
        }
        
        function createBackgroundWord() {
            const word = document.createElement('div');
            word.textContent = backgroundWords[Math.floor(Math.random() * backgroundWords.length)];
            word.classList.add('background-word');
            word.style.top = `${Math.random() * 90}vh`;
            word.style.animationDelay = `${Math.random() * 15}s`;
            document.body.appendChild(word);
            word.addEventListener('animationend', () => word.remove());
        }

        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.textContent = '💖';
            heart.classList.add('floating-heart');
            heart.style.left = `${Math.random() * 100}vw`;
            heart.style.animationDuration = `${Math.random() * 3 + 4}s`;
            heart.style.animationDelay = `${Math.random() * 3}s`;
            heart.style.transform = `scale(${Math.random() * 0.5 + 0.8})`;
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 7000);
        }

        function createLoveWord() {
            const word = document.createElement('div');
            word.textContent = loveWords[Math.floor(Math.random() * loveWords.length)];
            word.classList.add('love-word');
            word.style.top = `${Math.random() * 90}vh`;
            word.style.left = `${Math.random() * 90}vw`;
            word.style.animationDelay = `${Math.random()}s`;
            loveEffectsContainer.appendChild(word);
            word.addEventListener('animationend', () => word.remove());
        }

        function createStar() {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.top = `${Math.random() * 100}vh`;
            star.style.left = `${Math.random() * 100}vw`;
            star.style.animationDelay = `${Math.random() * 4}s`;
            star.style.animationDuration = `${Math.random() * 2 + 3}s`;
            loveEffectsContainer.appendChild(star);
        }

        setInterval(createCascadingWord, 600);
        setInterval(createFloatingHeart, 300);
        setInterval(createBackgroundWord, 3000);

        function createClickWord(x, y) {
            const text = clickWords[Math.floor(Math.random() * clickWords.length)];
            const word = document.createElement('div');
            word.innerHTML = text;
            word.classList.add('click-word');
            word.style.left = `${x}px`;
            word.style.top = `${y}px`;
            word.style.transform = `translate(-50%, -50%)`;
            stage.appendChild(word);
            word.addEventListener('animationend', () => word.remove());
        }
        
        function createParticle(x, y) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.style.left = `${x}px`;
            particle.style.top = `${y}px`;
            const angle = Math.random() * 360;
            const distance = Math.random() * 50 + 50;
            particle.style.setProperty('--x', `${Math.cos(angle) * distance}px`);
            particle.style.setProperty('--y', `${Math.sin(angle) * distance}px`);
            document.body.appendChild(particle);
            particle.addEventListener('animationend', () => particle.remove());
        }

        const handleInteraction = (e) => {
            if (passwordModal.classList.contains('show') || cartaModal.classList.contains('show')) return;
            if (e.target.closest('#main-text')) return;

            if (e.touches) {
                 Array.from(e.changedTouches).forEach(touch => {
                      createClickWord(touch.clientX, touch.clientY);
                      for(let i=0; i < 5; i++) createParticle(touch.clientX, touch.clientY);
                 });
            } else {
                 createClickWord(e.clientX, e.clientY);
                 for(let i=0; i < 5; i++) createParticle(e.clientX, e.clientY);
            }
        };

        stage.addEventListener('click', handleInteraction);
        stage.addEventListener('touchstart', handleInteraction, { passive: false });
        
        window.addEventListener('mousemove', (e) => {
            if (passwordModal.classList.contains('show') || cartaModal.classList.contains('show')) return;
            createParticle(e.clientX, e.clientY);
        });

    </script>
</body>
</html>
